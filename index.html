<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVOLURE Personal Skin Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      html, body {
        min-height: 100%;
        margin: 0;
        padding: 0;
        background-color: #fafaf9;
      }

      body {
        font-family: 'Inter', sans-serif;
        color: #1c1917;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Noto Serif JP', serif;
      }

      /* Custom styles for markdown headings to improve readability */
      .prose h3 {
        display: flex;
        align-items: center;
        font-size: 1.25rem; /* text-xl */
        line-height: 1.75rem;
        color: #1c1917; /* stone-900 */
        font-weight: 700;
        margin-top: 2.5rem;
        margin-bottom: 1.5rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid #e7e5e4; /* stone-200 */
        font-family: 'Noto Serif JP', serif;
      }

      .prose h3::before {
        content: '';
        flex-shrink: 0;
        display: block;
        width: 4px;
        height: 1.25rem; /* Match font-size */
        background-color: #44403c; /* stone-700 */
        margin-right: 0.75rem;
        border-radius: 2px;
      }

      .prose h4 {
        display: flex;
        align-items: center;
        font-size: 1.125rem; /* text-lg */
        line-height: 1.75rem;
        color: #292524; /* stone-800 */
        font-weight: 600;
        margin-top: 2rem;
        margin-bottom: 1rem;
        font-family: 'Inter', sans-serif;
      }

      .prose h4::before {
        content: '';
        flex-shrink: 0;
        display: block;
        width: 6px;
        height: 6px;
        background-color: #a8a29e; /* stone-400 */
        border-radius: 50%;
        margin-right: 0.75rem;
      }
      
      /* Elegant Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d6d3d1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a29e;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.5s ease-out forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.7.0",
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "recharts": "https://esm.sh/recharts@^3.0.2",
    "lucide-react": "https://esm.sh/lucide-react@^0.525.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "react-hot-toast": "https://esm.sh/react-hot-toast@^2.5.2"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
